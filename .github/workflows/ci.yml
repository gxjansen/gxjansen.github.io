name: CI

on:
  pull_request:
    branches: [master, development]
  push:
    branches: [master, development]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ${{ vars.CI_RUNNER || 'self-hosted-sifa' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro build

  test:
    name: Test
    runs-on: ${{ vars.CI_RUNNER || 'self-hosted-sifa' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vitest run --reporter=verbose

  format:
    name: Format
    runs-on: ${{ vars.CI_RUNNER || 'self-hosted-sifa' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check

  typecheck:
    name: Type Check
    runs-on: ${{ vars.CI_RUNNER || 'self-hosted-sifa' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  check:
    name: All CI checks passed
    needs: [build, test, format, typecheck]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Fail if any dependency failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more CI jobs failed"
          exit 1
      - name: Success
        run: echo "All CI jobs passed"
