[dev]
  command = "npm run dev"
  framework = "astro"
  port = 8888
  targetPort = 4321

[build]
  command = "npm run build"
  publish = "dist"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# Sitemap handling
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-index.xml"
  to = "/sitemap-index.xml"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-0.xml"
  to = "/sitemap-0.xml"
  status = 200
  force = true

# Function configuration
[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  external_node_modules = ["fast-xml-parser"]
  node_bundler = "esbuild"
  included_files = ["src/types/**"]

[functions.getPodcastFeeds]
  timeout = 30

[functions.newsletter-subscribe]
  timeout = 10

# Trailing slash redirects (must come before function handling)
# Redirect URLs without trailing slashes to versions with trailing slashes
# This fixes "Canonical URL Different" warnings in LibreCrawl
[[redirects]]
  from = "/*"
  to = "/:splat/"
  status = 301
  force = false
  # Only redirect paths without file extensions and not starting with _
  conditions = {path = ["!/*.*", "!/_*"]}

# Serve .well-known files directly (before catch-all)
[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200

# SSR routing is handled by the @astrojs/netlify adapter via its v2
# function in .netlify/v1/functions/ssr (declared path: "/*",
# preferStatic: true). A previous catch-all here pointed at a
# non-existent /.netlify/functions/entry, which silently 404'd every
# dynamic route once SSR endpoints landed in /api/.

# Serve .md files with correct Content-Type for agents / curl clients
[[headers]]
  for = "/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"

# Serve the AT Protocol DID well-known file as text/plain so consumers
# (e.g. Bluesky's Standard.site discovery) parse it verbatim.
[[headers]]
  for = "/.well-known/atproto-did"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# Content negotiation: browsers/agents that send Accept: text/markdown
# are redirected to the pre-built .md file for that route.
# These must appear BEFORE the trailing-slash splat and the SSR catch-all.
# Explicit per-route blocks are used instead of a global splat because
# Netlify's header-condition matching on splat redirects is unreliable
# when combined with the existing trailing-slash splat rule.
[[redirects]]
  from = "/about/"
  to = "/about.md"
  status = 308
  conditions = {Header = {Accept = "text/markdown"}}

[[redirects]]
  from = "/services/"
  to = "/services.md"
  status = 308
  conditions = {Header = {Accept = "text/markdown"}}

[[redirects]]
  from = "/services/*"
  to = "/services/:splat.md"
  status = 308
  conditions = {Header = {Accept = "text/markdown"}}

[[redirects]]
  from = "/communities/"
  to = "/communities.md"
  status = 308
  conditions = {Header = {Accept = "text/markdown"}}

[[redirects]]
  from = "/projects/"
  to = "/projects.md"
  status = 308
  conditions = {Header = {Accept = "text/markdown"}}

[[redirects]]
  from = "/speaker/"
  to = "/speaker.md"
  status = 308
  conditions = {Header = {Accept = "text/markdown"}}

[[redirects]]
  from = "/press/"
  to = "/press.md"
  status = 308
  conditions = {Header = {Accept = "text/markdown"}}

[[redirects]]
  from = "/contact/"
  to = "/contact.md"
  status = 308
  conditions = {Header = {Accept = "text/markdown"}}

[[redirects]]
  from = "/retainer/"
  to = "/retainer.md"
