[dev]
  command = "npm run dev"
  framework = "astro"
  port = 8888
  targetPort = 4321

[build]
  command = "npm run build"
  publish = "dist"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# Sitemap handling
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-index.xml"
  to = "/sitemap-index.xml"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-0.xml"
  to = "/sitemap-0.xml"
  status = 200
  force = true

# Function configuration
[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  external_node_modules = ["fast-xml-parser"]
  node_bundler = "esbuild"
  included_files = ["src/types/**"]

[functions.getPodcastFeeds]
  timeout = 30

[functions.newsletter-subscribe]
  timeout = 10

# Trailing slash redirects (must come before function handling)
# Redirect URLs without trailing slashes to versions with trailing slashes
# This fixes "Canonical URL Different" warnings in LibreCrawl
[[redirects]]
  from = "/*"
  to = "/:splat/"
  status = 301
  force = false
  # Only redirect paths without file extensions and not starting with _
  conditions = {path = ["!/*.*", "!/_*"]}

# Serve .well-known files directly (before catch-all)
[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200

# SSR routing is handled by the @astrojs/netlify adapter via its v2
# function in .netlify/v1/functions/ssr (declared path: "/*",
# preferStatic: true). A previous catch-all here pointed at a
# non-existent /.netlify/functions/entry, which silently 404'd every
# dynamic route once SSR endpoints landed in /api/.

# Content Security Policy headers
[[headers]]
  for = "/*"
  [headers.values]
    # NOTE: 'unsafe-inline' is intentionally kept (for now). The site contains
    # many inline event handlers (onload/onclick/onerror on iframes for lazy-loaded
    # YouTube/Spotify/SlideShare embeds), inline scripts that vary per-page via
    # Astro `define:vars` (carousel components on home/blog, slide embeds), and
    # per-page JSON-LD blocks (author pages, retainer). Hash-based CSP for all of
    # these is not feasible without significant refactor — see issue #132 for the
    # full inventory. 'unsafe-eval' has been removed: a build-output audit
    # (grep eval(/new Function( across dist/_astro/*.js) confirmed nothing in the
    # shipped browser bundle relies on it.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://u.a11y.nl https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://u.a11y.nl https://public.api.bsky.app; media-src 'self' https:; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://share.transistor.fm https://open.spotify.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://share.transistor.fm; object-src 'none'; worker-src 'self' blob:; upgrade-insecure-requests;"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/.netlify/functions/getPodcastFeeds"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET"
