<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Source Sans 3', 'Source Sans Pro', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#24837B"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1c2024">Barazo Architecture</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#6b7280">User data stays on their PDS. The AppView maintains a searchable index.</text>

  <!-- Data flow annotation (muted, above main blocks) -->
  <!-- Member icon -->
  <g transform="translate(260, 68)">
    <circle cx="14" cy="14" r="12" fill="#9ca3af" opacity="0.15" stroke="#9ca3af" stroke-width="1"/>
    <text x="14" y="18" text-anchor="middle" font-size="12" fill="#9ca3af">@</text>
    <text x="14" y="40" text-anchor="middle" font-size="10" fill="#9ca3af">Member</text>
  </g>

  <!-- Arrow: Member -> PDS -->
  <line x1="286" y1="82" x2="315" y2="82" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow-gray)"/>

  <!-- PDS small box (muted) -->
  <g transform="translate(323, 66)">
    <rect width="60" height="32" rx="4" fill="white" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="30" y="20" text-anchor="middle" font-size="11" fill="#9ca3af">PDS</text>
  </g>

  <!-- Arrow: PDS -> Firehose -->
  <line x1="383" y1="82" x2="415" y2="82" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow-gray)"/>

  <!-- Firehose small box (muted) -->
  <g transform="translate(423, 66)">
    <rect width="75" height="32" rx="4" fill="white" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="37" y="20" text-anchor="middle" font-size="11" fill="#9ca3af">Firehose</text>
  </g>

  <!-- Arrow: Firehose -> AppView (diagonal down) -->
  <line x1="460" y1="98" x2="400" y2="148" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <text x="443" y="126" font-size="9" fill="#9ca3af">streams</text>

  <!-- === THREE MAIN BLOCKS === -->

  <!-- 1. Lexicons -->
  <g transform="translate(30, 150)">
    <rect width="200" height="140" rx="6" fill="white" stroke="#24837B" stroke-width="1.5"/>
    <rect width="200" height="28" rx="6" fill="#24837B" opacity="0.1"/>
    <text x="100" y="19" text-anchor="middle" font-size="13" font-weight="600" fill="#24837B">Lexicons</text>
    <text x="100" y="52" text-anchor="middle" font-size="11" fill="#4b5563">forum.barazo.* namespace</text>
    <text x="100" y="72" text-anchor="middle" font-size="11" fill="#4b5563">Topics, replies, reactions</text>
    <text x="100" y="92" text-anchor="middle" font-size="11" fill="#4b5563">Published as open source</text>
    <text x="100" y="112" text-anchor="middle" font-size="11" fill="#4b5563">TypeScript package</text>
  </g>

  <!-- Arrow: Lexicons -> AppView -->
  <line x1="230" y1="220" x2="292" y2="220" stroke="#24837B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="261" y="210" text-anchor="middle" font-size="10" fill="#6b7280">defines</text>
  <text x="261" y="234" text-anchor="middle" font-size="10" fill="#6b7280">schema</text>

  <!-- 2. AppView -->
  <g transform="translate(300, 150)">
    <rect width="200" height="140" rx="6" fill="white" stroke="#24837B" stroke-width="1.5"/>
    <rect width="200" height="28" rx="6" fill="#24837B" opacity="0.1"/>
    <text x="100" y="19" text-anchor="middle" font-size="13" font-weight="600" fill="#24837B">AppView</text>
    <text x="100" y="52" text-anchor="middle" font-size="11" fill="#4b5563">Indexes from firehose</text>
    <text x="100" y="72" text-anchor="middle" font-size="11" fill="#4b5563">PostgreSQL</text>
    <text x="100" y="92" text-anchor="middle" font-size="11" fill="#4b5563">OAuth (DPoP), REST API</text>
    <text x="100" y="112" text-anchor="middle" font-size="11" fill="#4b5563">Moderation + search</text>
  </g>

  <!-- Arrow: AppView -> Frontend -->
  <line x1="500" y1="220" x2="562" y2="220" stroke="#24837B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="531" y="210" text-anchor="middle" font-size="10" fill="#6b7280">serves</text>

  <!-- 3. Frontend -->
  <g transform="translate(570, 150)">
    <rect width="200" height="140" rx="6" fill="white" stroke="#24837B" stroke-width="1.5"/>
    <rect width="200" height="28" rx="6" fill="#24837B" opacity="0.1"/>
    <text x="100" y="19" text-anchor="middle" font-size="13" font-weight="600" fill="#24837B">Frontend</text>
    <text x="100" y="52" text-anchor="middle" font-size="11" fill="#4b5563">Next.js, server-rendered</text>
    <text x="100" y="72" text-anchor="middle" font-size="11" fill="#4b5563">Accessible (WCAG 2.2 AA)</text>
    <text x="100" y="92" text-anchor="middle" font-size="11" fill="#4b5563">Topics, search, moderation</text>
    <text x="100" y="112" text-anchor="middle" font-size="11" fill="#4b5563">Notifications, admin panel</text>
  </g>

  <!-- Note about data ownership -->
  <g transform="translate(30, 325)">
    <rect width="280" height="48" rx="4" fill="#24837B" opacity="0.06" stroke="#24837B" stroke-width="0.5"/>
    <text x="16" y="20" font-size="11" fill="#24837B" font-weight="600">Source of truth: user's PDS</text>
    <text x="16" y="38" font-size="11" fill="#4b5563">AppView index is rebuildable from firehose</text>
  </g>
</svg>
